<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#0284c7;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#accent)" opacity="0.3"/>
  <circle cx="660" cy="100" r="100" fill="#0ea5e9" opacity="0.04"/>
  <circle cx="140" cy="500" r="70" fill="#3b82f6" opacity="0.04"/>
  <!-- Commercial Building Icon -->
  <g transform="translate(400,220)" fill="none" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main building -->
    <rect x="-60" y="-60" width="120" height="140" rx="3" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="2"/>
    <!-- Roof accent -->
    <rect x="-65" y="-65" width="130" height="8" rx="2" fill="#0ea5e9" opacity="0.12"/>
    <!-- Windows grid -->
    <rect x="-45" y="-45" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <rect x="-15" y="-45" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <rect x="15" y="-45" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <rect x="-45" y="-22" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <rect x="-15" y="-22" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <rect x="15" y="-22" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <rect x="-45" y="2" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <rect x="-15" y="2" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <rect x="15" y="2" width="18" height="14" rx="2" fill="#0ea5e9" opacity="0.08" stroke="#0ea5e9" stroke-width="1"/>
    <!-- Door -->
    <rect x="-12" y="40" width="24" height="40" rx="3" fill="#0ea5e9" opacity="0.1" stroke="#0ea5e9" stroke-width="1.5"/>
    <!-- Shield badge overlay -->
    <g transform="translate(75,-30)" opacity="0.6">
      <path d="M0,-20 L18,-12 L18,5 Q18,18 0,25 Q-18,18 -18,5 L-18,-12 Z" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
      <path d="M-6,2 L-2,8 L8,-4" stroke="#22c55e" stroke-width="2" fill="none"/>
    </g>
    <!-- Smaller adjacent building -->
    <rect x="-100" y="0" width="35" height="80" rx="2" fill="#0ea5e9" opacity="0.05" stroke="#0ea5e9" stroke-width="1.5"/>
    <rect x="-92" y="10" width="10" height="8" rx="1" fill="#0ea5e9" opacity="0.06"/>
    <rect x="-92" y="25" width="10" height="8" rx="1" fill="#0ea5e9" opacity="0.06"/>
    <rect x="-92" y="40" width="10" height="8" rx="1" fill="#0ea5e9" opacity="0.06"/>
  </g>
  <text x="400" y="385" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.9">Commercial Pest Control</text>
  <text x="400" y="420" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" opacity="0.7">Offices, Restaurants &amp; Warehouses</text>
  <text x="400" y="570" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" opacity="0.4">800 x 600</text>
</svg>