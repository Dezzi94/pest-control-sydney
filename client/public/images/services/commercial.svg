<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Main commercial building -->
  <g transform="translate(520, 300)" stroke="#3b82f6" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main tower -->
    <rect x="-60" y="-180" width="140" height="280" rx="3" stroke-opacity="0.15"/>
    <!-- Roof accent -->
    <rect x="-65" y="-185" width="150" height="8" rx="2" stroke-opacity="0.1"/>
    <!-- Windows grid (4 columns, 7 rows) -->
    <g stroke-opacity="0.1" stroke-width="1">
      <!-- Row 1 -->
      <rect x="-48" y="-168" width="22" height="16" rx="1"/>
      <rect x="-18" y="-168" width="22" height="16" rx="1"/>
      <rect x="12" y="-168" width="22" height="16" rx="1"/>
      <rect x="42" y="-168" width="22" height="16" rx="1"/>
      <!-- Row 2 -->
      <rect x="-48" y="-140" width="22" height="16" rx="1"/>
      <rect x="-18" y="-140" width="22" height="16" rx="1"/>
      <rect x="12" y="-140" width="22" height="16" rx="1"/>
      <rect x="42" y="-140" width="22" height="16" rx="1"/>
      <!-- Row 3 -->
      <rect x="-48" y="-112" width="22" height="16" rx="1"/>
      <rect x="-18" y="-112" width="22" height="16" rx="1"/>
      <rect x="12" y="-112" width="22" height="16" rx="1"/>
      <rect x="42" y="-112" width="22" height="16" rx="1"/>
      <!-- Row 4 -->
      <rect x="-48" y="-84" width="22" height="16" rx="1"/>
      <rect x="-18" y="-84" width="22" height="16" rx="1"/>
      <rect x="12" y="-84" width="22" height="16" rx="1"/>
      <rect x="42" y="-84" width="22" height="16" rx="1"/>
      <!-- Row 5 -->
      <rect x="-48" y="-56" width="22" height="16" rx="1"/>
      <rect x="-18" y="-56" width="22" height="16" rx="1"/>
      <rect x="12" y="-56" width="22" height="16" rx="1"/>
      <rect x="42" y="-56" width="22" height="16" rx="1"/>
      <!-- Row 6 -->
      <rect x="-48" y="-28" width="22" height="16" rx="1"/>
      <rect x="-18" y="-28" width="22" height="16" rx="1"/>
      <rect x="12" y="-28" width="22" height="16" rx="1"/>
      <rect x="42" y="-28" width="22" height="16" rx="1"/>
      <!-- Row 7 -->
      <rect x="-48" y="0" width="22" height="16" rx="1"/>
      <rect x="-18" y="0" width="22" height="16" rx="1"/>
      <rect x="12" y="0" width="22" height="16" rx="1"/>
      <rect x="42" y="0" width="22" height="16" rx="1"/>
    </g>
    <!-- Entrance / lobby -->
    <rect x="-15" y="55" width="50" height="45" rx="3" stroke-opacity="0.1"/>
    <line x1="10" y1="55" x2="10" y2="100" stroke-opacity="0.06"/>
    <!-- Door handle -->
    <circle cx="4" cy="80" r="2" stroke-opacity="0.08"/>
    <!-- Smaller adjacent building -->
    <rect x="-120" y="-80" width="55" height="180" rx="2" stroke-opacity="0.1"/>
    <rect x="-125" y="-84" width="65" height="6" rx="1" stroke-opacity="0.07"/>
    <!-- Smaller building windows -->
    <g stroke-opacity="0.07" stroke-width="1">
      <rect x="-112" y="-68" width="16" height="12" rx="1"/>
      <rect x="-88" y="-68" width="16" height="12" rx="1"/>
      <rect x="-112" y="-46" width="16" height="12" rx="1"/>
      <rect x="-88" y="-46" width="16" height="12" rx="1"/>
      <rect x="-112" y="-24" width="16" height="12" rx="1"/>
      <rect x="-88" y="-24" width="16" height="12" rx="1"/>
      <rect x="-112" y="-2" width="16" height="12" rx="1"/>
      <rect x="-88" y="-2" width="16" height="12" rx="1"/>
      <rect x="-112" y="20" width="16" height="12" rx="1"/>
      <rect x="-88" y="20" width="16" height="12" rx="1"/>
    </g>
    <!-- Warehouse on the right -->
    <g stroke-opacity="0.08">
      <path d="M90 100 L90 10 L140 -20 L190 10 L190 100"/>
      <!-- Roller door -->
      <rect x="110" y="50" width="60" height="50" rx="2"/>
      <line x1="110" y1="62" x2="170" y2="62" stroke-opacity="0.04"/>
      <line x1="110" y1="74" x2="170" y2="74" stroke-opacity="0.04"/>
      <line x1="110" y1="86" x2="170" y2="86" stroke-opacity="0.04"/>
    </g>
    <!-- Ground line -->
    <line x1="-140" y1="100" x2="200" y2="100" stroke-opacity="0.06"/>
  </g>
  <!-- Pest shield overlay -->
  <g transform="translate(400, 200)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shield -->
    <path d="M0 -50 L35 -36 L35 6 Q35 36 0 52 Q-35 36 -35 6 L-35 -36 Z" stroke-opacity="0.2" fill="#3b82f6" fill-opacity="0.03"/>
    <!-- Checkmark -->
    <path d="M-14 2 L-4 14 L16 -10" stroke-opacity="0.3" stroke-width="3"/>
    <!-- Protection burst lines -->
    <g stroke-opacity="0.08" stroke-width="1">
      <line x1="-40" y1="-20" x2="-50" y2="-26"/>
      <line x1="-38" y1="15" x2="-48" y2="20"/>
      <line x1="40" y1="-20" x2="50" y2="-26"/>
      <line x1="38" y1="15" x2="48" y2="20"/>
      <line x1="0" y1="-56" x2="0" y2="-66"/>
    </g>
  </g>
</svg>