<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#accent)" opacity="0.4"/>
  <!-- Decorative -->
  <circle cx="650" cy="80" r="110" fill="#8b5cf6" opacity="0.04"/>
  <circle cx="150" cy="520" r="90" fill="#3b82f6" opacity="0.04"/>
  <!-- Web pattern (background) -->
  <g stroke="#8b5cf6" stroke-width="0.5" opacity="0.1" fill="none">
    <!-- Radial lines -->
    <line x1="400" y1="100" x2="400" y2="450"/>
    <line x1="250" y1="130" x2="550" y2="420"/>
    <line x1="180" y1="275" x2="620" y2="275"/>
    <line x1="250" y1="420" x2="550" y2="130"/>
    <!-- Concentric web rings -->
    <circle cx="400" cy="275" r="50"/>
    <circle cx="400" cy="275" r="100"/>
    <circle cx="400" cy="275" r="150"/>
  </g>
  <!-- Spider Icon -->
  <g transform="translate(400,240)" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body -->
    <ellipse cx="0" cy="15" rx="20" ry="28" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6"/>
    <!-- Head -->
    <circle cx="0" cy="-18" r="16" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6"/>
    <!-- Eyes -->
    <circle cx="-6" cy="-22" r="3" fill="#8b5cf6" opacity="0.4"/>
    <circle cx="6" cy="-22" r="3" fill="#8b5cf6" opacity="0.4"/>
    <circle cx="-3" cy="-26" r="2" fill="#8b5cf6" opacity="0.3"/>
    <circle cx="3" cy="-26" r="2" fill="#8b5cf6" opacity="0.3"/>
    <!-- 8 legs (4 pairs) -->
    <!-- Front legs -->
    <path d="M-14,-12 Q-45,-50 -65,-45" stroke-width="2.5"/>
    <path d="M14,-12 Q45,-50 65,-45" stroke-width="2.5"/>
    <!-- Second pair -->
    <path d="M-18,-2 Q-55,-15 -72,-5" stroke-width="2.5"/>
    <path d="M18,-2 Q55,-15 72,-5" stroke-width="2.5"/>
    <!-- Third pair -->
    <path d="M-18,10 Q-55,20 -70,35" stroke-width="2.5"/>
    <path d="M18,10 Q55,20 70,35" stroke-width="2.5"/>
    <!-- Back legs -->
    <path d="M-15,25 Q-40,55 -55,65" stroke-width="2.5"/>
    <path d="M15,25 Q40,55 55,65" stroke-width="2.5"/>
    <!-- Chelicerae/fangs -->
    <path d="M-5,-32 L-8,-40" stroke-width="2"/>
    <path d="M5,-32 L8,-40" stroke-width="2"/>
  </g>
  <!-- Label -->
  <text x="400" y="375" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.9">Spider Treatment</text>
  <text x="400" y="410" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" opacity="0.7">Safe &amp; Effective Spider Removal</text>
  <text x="400" y="570" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" opacity="0.4">800 x 600</text>
</svg>