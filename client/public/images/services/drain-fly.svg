<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Drain / pipe structure -->
  <g stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Floor surface -->
    <line x1="350" y1="420" x2="750" y2="420" stroke-opacity="0.08"/>
    <!-- Drain grate (circular, viewed from angle) -->
    <ellipse cx="560" cy="420" rx="60" ry="18" stroke-opacity="0.12"/>
    <ellipse cx="560" cy="420" rx="50" ry="15" stroke-opacity="0.08"/>
    <!-- Grate slots -->
    <line x1="520" y1="420" x2="600" y2="420" stroke-opacity="0.08"/>
    <line x1="525" y1="414" x2="595" y2="414" stroke-opacity="0.06"/>
    <line x1="525" y1="426" x2="595" y2="426" stroke-opacity="0.06"/>
    <line x1="530" y1="408" x2="590" y2="408" stroke-opacity="0.05"/>
    <line x1="530" y1="432" x2="590" y2="432" stroke-opacity="0.05"/>
    <!-- Cross bars -->
    <line x1="540" y1="403" x2="540" y2="437" stroke-opacity="0.06"/>
    <line x1="560" y1="402" x2="560" y2="438" stroke-opacity="0.06"/>
    <line x1="580" y1="403" x2="580" y2="437" stroke-opacity="0.06"/>
    <!-- Pipe below (visible through grate) -->
    <ellipse cx="560" cy="425" rx="35" ry="10" stroke-opacity="0.06" stroke-dasharray="3 3"/>
    <!-- Water/moisture droplets -->
    <g fill="#3b82f6" fill-opacity="0.04">
      <circle cx="545" cy="415" r="3"/>
      <circle cx="570" cy="422" r="2"/>
      <circle cx="555" cy="430" r="2.5"/>
    </g>
    <!-- Wall pipes -->
    <g stroke-opacity="0.06" stroke-width="2">
      <line x1="700" y1="200" x2="700" y2="420"/>
      <path d="M700 320 Q710 320 710 330 L710 340 Q710 350 700 350"/>
      <!-- Pipe joint -->
      <rect x="694" y="312" width="12" height="8" rx="1" stroke-opacity="0.05"/>
    </g>
  </g>
  <!-- Main drain fly (moth-like, fuzzy) -->
  <g transform="translate(530, 320)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body (small, furry) -->
    <ellipse cx="0" cy="0" rx="8" ry="16" stroke-opacity="0.3"/>
    <!-- Fuzzy body texture -->
    <g stroke-opacity="0.1" stroke-width="0.6">
      <path d="M-6 -8 L-10 -10"/>
      <path d="M6 -8 L10 -10"/>
      <path d="M-7 -2 L-11 -3"/>
      <path d="M7 -2 L11 -3"/>
      <path d="M-6 4 L-10 5"/>
      <path d="M6 4 L10 5"/>
      <path d="M-5 10 L-9 12"/>
      <path d="M5 10 L9 12"/>
    </g>
    <!-- Head -->
    <circle cx="0" cy="-20" r="7" stroke-opacity="0.3"/>
    <!-- Fuzzy antennae (feathery) -->
    <path d="M-5 -26 Q-12 -38 -16 -48" stroke-opacity="0.25" stroke-width="1.5"/>
    <path d="M5 -26 Q12 -38 16 -48" stroke-opacity="0.25" stroke-width="1.5"/>
    <!-- Antenna fuzz -->
    <g stroke-opacity="0.12" stroke-width="0.6">
      <line x1="-8" y1="-32" x2="-12" y2="-30"/>
      <line x1="-10" y1="-36" x2="-14" y2="-34"/>
      <line x1="-12" y1="-40" x2="-16" y2="-38"/>
      <line x1="8" y1="-32" x2="12" y2="-30"/>
      <line x1="10" y1="-36" x2="14" y2="-34"/>
      <line x1="12" y1="-40" x2="16" y2="-38"/>
    </g>
    <!-- Eyes -->
    <circle cx="-3" cy="-22" r="2" stroke-opacity="0.3"/>
    <circle cx="3" cy="-22" r="2" stroke-opacity="0.3"/>
    <!-- Wings (leaf-shaped, held roof-like) -->
    <path d="M-6 -10 Q-40 -20 -55 -5 Q-60 5 -50 15 Q-35 25 -8 14" stroke-opacity="0.2"/>
    <path d="M6 -10 Q40 -20 55 -5 Q60 5 50 15 Q35 25 8 14" stroke-opacity="0.2"/>
    <!-- Wing venation -->
    <path d="M-10 -6 Q-30 -8 -45 0" stroke-opacity="0.08" stroke-width="0.7"/>
    <path d="M-8 0 Q-28 4 -42 10" stroke-opacity="0.08" stroke-width="0.7"/>
    <path d="M-7 6 Q-24 12 -38 14" stroke-opacity="0.06" stroke-width="0.7"/>
    <path d="M10 -6 Q30 -8 45 0" stroke-opacity="0.08" stroke-width="0.7"/>
    <path d="M8 0 Q28 4 42 10" stroke-opacity="0.08" stroke-width="0.7"/>
    <path d="M7 6 Q24 12 38 14" stroke-opacity="0.06" stroke-width="0.7"/>
    <!-- Wing fringe (hairy edges) -->
    <g stroke-opacity="0.06" stroke-width="0.5">
      <line x1="-52" y1="-2" x2="-56" y2="-4"/>
      <line x1="-56" y1="4" x2="-60" y2="3"/>
      <line x1="-52" y1="10" x2="-56" y2="11"/>
      <line x1="52" y1="-2" x2="56" y2="-4"/>
      <line x1="56" y1="4" x2="60" y2="3"/>
      <line x1="52" y1="10" x2="56" y2="11"/>
    </g>
    <!-- Legs (6, short) -->
    <path d="M-6 4 L-14 10" stroke-opacity="0.15" stroke-width="1"/>
    <path d="M-5 8 L-12 16" stroke-opacity="0.15" stroke-width="1"/>
    <path d="M-4 12 L-10 20" stroke-opacity="0.15" stroke-width="1"/>
    <path d="M6 4 L14 10" stroke-opacity="0.15" stroke-width="1"/>
    <path d="M5 8 L12 16" stroke-opacity="0.15" stroke-width="1"/>
    <path d="M4 12 L10 20" stroke-opacity="0.15" stroke-width="1"/>
  </g>
  <!-- Additional small flies near drain -->
  <g transform="translate(610, 380) scale(0.4)" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="2" fill="none" stroke-linecap="round">
    <ellipse cx="0" cy="0" rx="8" ry="16"/>
    <circle cx="0" cy="-20" r="7"/>
    <path d="M-6 -10 Q-40 -20 -55 -5 Q-60 5 -50 15 Q-35 25 -8 14"/>
    <path d="M6 -10 Q40 -20 55 -5 Q60 5 50 15 Q35 25 8 14"/>
  </g>
  <g transform="translate(490, 390) scale(0.3) rotate(20)" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="2.5" fill="none" stroke-linecap="round">
    <ellipse cx="0" cy="0" rx="8" ry="16"/>
    <circle cx="0" cy="-20" r="7"/>
    <path d="M-6 -10 Q-40 -20 -55 -5 Q-60 5 -50 15 Q-35 25 -8 14"/>
    <path d="M6 -10 Q40 -20 55 -5 Q60 5 50 15 Q35 25 8 14"/>
  </g>
</svg>