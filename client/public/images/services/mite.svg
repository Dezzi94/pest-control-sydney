<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Microscope crosshairs -->
  <g stroke="#3b82f6" stroke-opacity="0.05" stroke-width="1" fill="none">
    <line x1="540" y1="80" x2="540" y2="520"/>
    <line x1="340" y1="300" x2="740" y2="300"/>
    <!-- Scale marks -->
    <line x1="535" y1="150" x2="545" y2="150"/>
    <line x1="535" y1="200" x2="545" y2="200"/>
    <line x1="535" y1="250" x2="545" y2="250"/>
    <line x1="535" y1="350" x2="545" y2="350"/>
    <line x1="535" y1="400" x2="545" y2="400"/>
    <line x1="535" y1="450" x2="545" y2="450"/>
    <line x1="400" y1="295" x2="400" y2="305"/>
    <line x1="450" y1="295" x2="450" y2="305"/>
    <line x1="500" y1="295" x2="500" y2="305"/>
    <line x1="580" y1="295" x2="580" y2="305"/>
    <line x1="630" y1="295" x2="630" y2="305"/>
    <line x1="680" y1="295" x2="680" y2="305"/>
  </g>
  <!-- Magnification circle -->
  <circle cx="540" cy="290" r="190" stroke="#3b82f6" stroke-opacity="0.06" stroke-width="2" fill="none"/>
  <circle cx="540" cy="290" r="195" stroke="#3b82f6" stroke-opacity="0.04" stroke-width="1" fill="none"/>
  <!-- Microscope lens edge -->
  <circle cx="540" cy="290" r="200" stroke="#3b82f6" stroke-opacity="0.03" stroke-width="4" fill="none"/>
  <!-- Enlarged mite (arachnid, 8 legs) -->
  <g transform="translate(540, 280)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body (oval, somewhat transparent-looking) -->
    <ellipse cx="0" cy="0" rx="50" ry="60" stroke-opacity="0.3"/>
    <!-- Internal structure visible (gut/organs suggestion) -->
    <ellipse cx="0" cy="10" rx="30" ry="35" stroke-opacity="0.08" stroke-width="1"/>
    <ellipse cx="0" cy="20" rx="18" ry="20" stroke-opacity="0.06" stroke-width="0.8"/>
    <!-- Surface texture (bumpy) -->
    <g stroke-opacity="0.06" stroke-width="0.8">
      <circle cx="-15" cy="-20" r="6"/>
      <circle cx="15" cy="-20" r="6"/>
      <circle cx="-20" cy="0" r="7"/>
      <circle cx="20" cy="0" r="7"/>
      <circle cx="-12" cy="20" r="6"/>
      <circle cx="12" cy="20" r="6"/>
      <circle cx="0" cy="-30" r="5"/>
      <circle cx="0" cy="35" r="6"/>
    </g>
    <!-- Gnathosoma (mouthparts) -->
    <ellipse cx="0" cy="-68" rx="14" ry="12" stroke-opacity="0.3"/>
    <!-- Chelicerae -->
    <path d="M-5 -80 L-8 -90 Q-6 -94 -4 -90" stroke-opacity="0.25" stroke-width="1.5"/>
    <path d="M5 -80 L8 -90 Q6 -94 4 -90" stroke-opacity="0.25" stroke-width="1.5"/>
    <!-- Palps -->
    <path d="M-12 -72 Q-18 -78 -20 -84" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M12 -72 Q18 -78 20 -84" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- 8 legs (4 pairs) -->
    <!-- Front pair (near mouthparts) -->
    <path d="M-38 -42 Q-60 -58 -78 -66 Q-90 -72 -100 -68" stroke-opacity="0.3" stroke-width="1.8"/>
    <path d="M38 -42 Q60 -58 78 -66 Q90 -72 100 -68" stroke-opacity="0.3" stroke-width="1.8"/>
    <!-- Leg hairs -->
    <g stroke-opacity="0.1" stroke-width="0.6">
      <line x1="-60" y1="-58" x2="-64" y2="-64"/>
      <line x1="-72" y1="-64" x2="-76" y2="-70"/>
      <line x1="60" y1="-58" x2="64" y2="-64"/>
      <line x1="72" y1="-64" x2="76" y2="-70"/>
    </g>
    <!-- Second pair -->
    <path d="M-48 -16 Q-72 -22 -90 -16 Q-104 -10 -112 0" stroke-opacity="0.28" stroke-width="1.8"/>
    <path d="M48 -16 Q72 -22 90 -16 Q104 -10 112 0" stroke-opacity="0.28" stroke-width="1.8"/>
    <!-- Third pair -->
    <path d="M-48 14 Q-72 20 -88 30 Q-100 40 -108 52" stroke-opacity="0.25" stroke-width="1.8"/>
    <path d="M48 14 Q72 20 88 30 Q100 40 108 52" stroke-opacity="0.25" stroke-width="1.8"/>
    <!-- Back pair -->
    <path d="M-38 42 Q-56 58 -68 72 Q-76 84 -80 94" stroke-opacity="0.22" stroke-width="1.8"/>
    <path d="M38 42 Q56 58 68 72 Q76 84 80 94" stroke-opacity="0.22" stroke-width="1.8"/>
    <!-- Setae / bristles on body -->
    <g stroke-opacity="0.08" stroke-width="0.6">
      <line x1="-30" y1="-45" x2="-36" y2="-52"/>
      <line x1="30" y1="-45" x2="36" y2="-52"/>
      <line x1="-40" y1="0" x2="-48" y2="-2"/>
      <line x1="40" y1="0" x2="48" y2="-2"/>
      <line x1="-32" y1="40" x2="-38" y2="46"/>
      <line x1="32" y1="40" x2="38" y2="46"/>
      <line x1="0" y1="58" x2="0" y2="66"/>
    </g>
  </g>
  <!-- Scale bar -->
  <g stroke="#3b82f6" stroke-opacity="0.08" stroke-width="1" fill="none">
    <line x1="400" y1="520" x2="500" y2="520"/>
    <line x1="400" y1="516" x2="400" y2="524"/>
    <line x1="500" y1="516" x2="500" y2="524"/>
  </g>
</svg>