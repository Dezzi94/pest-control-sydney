<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Subtle bathroom tile pattern -->
  <g stroke="#3b82f6" stroke-opacity="0.04" stroke-width="0.8" fill="none">
    <line x1="350" y1="60" x2="350" y2="560"/>
    <line x1="430" y1="60" x2="430" y2="560"/>
    <line x1="510" y1="60" x2="510" y2="560"/>
    <line x1="590" y1="60" x2="590" y2="560"/>
    <line x1="670" y1="60" x2="670" y2="560"/>
    <line x1="750" y1="60" x2="750" y2="560"/>
    <line x1="330" y1="100" x2="770" y2="100"/>
    <line x1="330" y1="180" x2="770" y2="180"/>
    <line x1="330" y1="260" x2="770" y2="260"/>
    <line x1="330" y1="340" x2="770" y2="340"/>
    <line x1="330" y1="420" x2="770" y2="420"/>
    <line x1="330" y1="500" x2="770" y2="500"/>
  </g>
  <!-- Main silverfish -->
  <g transform="translate(530, 290) rotate(-15)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tapered body (carrot-shaped) -->
    <path d="M-60 0 Q-50 -18 -30 -20 Q0 -22 30 -16 Q55 -10 70 0 Q55 10 30 16 Q0 22 -30 20 Q-50 18 -60 0" stroke-opacity="0.3"/>
    <!-- Body segments -->
    <path d="M-40 -16 Q-40 0 -40 16" stroke-opacity="0.1" stroke-width="1"/>
    <path d="M-20 -20 Q-20 0 -20 20" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M0 -22 Q0 0 0 22" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M20 -18 Q20 0 20 18" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M40 -14 Q40 0 40 14" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M55 -8 Q55 0 55 8" stroke-opacity="0.06" stroke-width="1"/>
    <!-- Scale-like texture -->
    <g stroke-opacity="0.06" stroke-width="0.6">
      <path d="M-30 -8 Q-25 -12 -20 -8"/>
      <path d="M-10 -10 Q-5 -14 0 -10"/>
      <path d="M10 -8 Q15 -12 20 -8"/>
      <path d="M-20 4 Q-15 0 -10 4"/>
      <path d="M0 6 Q5 2 10 6"/>
      <path d="M20 4 Q25 0 30 4"/>
    </g>
    <!-- Head -->
    <ellipse cx="-66" cy="0" rx="10" ry="8" stroke-opacity="0.3"/>
    <!-- Eyes -->
    <circle cx="-72" cy="-3" r="2" stroke-opacity="0.3"/>
    <circle cx="-72" cy="3" r="2" stroke-opacity="0.3"/>
    <!-- Long antennae -->
    <path d="M-76 -4 Q-100 -20 -120 -30 Q-135 -38 -150 -36" stroke-opacity="0.25" stroke-width="1.5"/>
    <path d="M-76 4 Q-100 20 -120 30 Q-135 38 -150 36" stroke-opacity="0.25" stroke-width="1.5"/>
    <!-- Three tail cerci -->
    <path d="M70 0 Q90 0 110 -2 Q130 -4 148 0" stroke-opacity="0.25" stroke-width="1.5"/>
    <path d="M68 -6 Q88 -14 108 -22 Q128 -30 142 -34" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M68 6 Q88 14 108 22 Q128 30 142 34" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Legs - 3 pairs -->
    <path d="M-40 -16 Q-48 -28 -54 -34" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M-15 -20 Q-20 -34 -24 -42" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M10 -20 Q8 -34 6 -42" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M-40 16 Q-48 28 -54 34" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M-15 20 Q-20 34 -24 42" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M10 20 Q8 34 6 42" stroke-opacity="0.2" stroke-width="1.5"/>
  </g>
  <!-- Second smaller silverfish -->
  <g transform="translate(420, 430) rotate(10) scale(0.5)" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="2" fill="none" stroke-linecap="round">
    <path d="M-60 0 Q-50 -18 -30 -20 Q0 -22 30 -16 Q55 -10 70 0 Q55 10 30 16 Q0 22 -30 20 Q-50 18 -60 0"/>
    <ellipse cx="-66" cy="0" rx="10" ry="8"/>
    <path d="M-76 -4 Q-100 -20 -120 -30 Q-135 -38 -150 -36"/>
    <path d="M-76 4 Q-100 20 -120 30 Q-135 38 -150 36"/>
    <path d="M70 0 Q90 0 110 -2 Q130 -4 148 0"/>
    <path d="M68 -6 Q88 -14 108 -22 Q128 -30 142 -34"/>
    <path d="M68 6 Q88 14 108 22 Q128 30 142 34"/>
  </g>
</svg>