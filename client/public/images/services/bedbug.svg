<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9333ea;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#7e22ce;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#accent)" opacity="0.3"/>
  <circle cx="660" cy="100" r="100" fill="#9333ea" opacity="0.04"/>
  <circle cx="140" cy="500" r="70" fill="#3b82f6" opacity="0.04"/>
  <!-- Bed Icon with bug -->
  <g transform="translate(400,220)" fill="none" stroke="#9333ea" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bed frame -->
    <rect x="-80" y="0" width="160" height="60" rx="5" fill="#9333ea" opacity="0.08" stroke="#9333ea" stroke-width="2"/>
    <!-- Headboard -->
    <rect x="-80" y="-35" width="40" height="40" rx="5" fill="#9333ea" opacity="0.06" stroke="#9333ea" stroke-width="1.5"/>
    <!-- Pillow -->
    <rect x="-72" y="-10" width="30" height="15" rx="5" fill="#9333ea" opacity="0.1" stroke="#9333ea" stroke-width="1.5"/>
    <!-- Blanket folds -->
    <path d="M-35,15 Q0,5 40,15 Q60,20 80,15" fill="none" stroke="#9333ea" stroke-width="1" opacity="0.3"/>
    <!-- Bed legs -->
    <line x1="-75" y1="60" x2="-75" y2="75" stroke-width="3"/>
    <line x1="75" y1="60" x2="75" y2="75" stroke-width="3"/>
    <!-- Small bedbug on bed -->
    <ellipse cx="20" cy="25" rx="10" ry="8" fill="#9333ea" opacity="0.2" stroke="#9333ea" stroke-width="1.5"/>
    <circle cx="14" cy="20" r="5" fill="#9333ea" opacity="0.15" stroke="#9333ea" stroke-width="1.5"/>
    <!-- Bug legs -->
    <line x1="12" y1="18" x2="5" y2="12" stroke-width="1.5"/>
    <line x1="11" y1="25" x2="4" y2="25" stroke-width="1.5"/>
    <line x1="12" y1="28" x2="5" y2="34" stroke-width="1.5"/>
    <line x1="28" y1="18" x2="35" y2="12" stroke-width="1.5"/>
    <line x1="29" y1="25" x2="36" y2="25" stroke-width="1.5"/>
    <line x1="28" y1="28" x2="35" y2="34" stroke-width="1.5"/>
    <!-- Warning triangle -->
    <g transform="translate(55,-25)" opacity="0.5">
      <path d="M0,-15 L13,10 L-13,10 Z" fill="#9333ea" opacity="0.15" stroke="#9333ea" stroke-width="1.5"/>
      <text x="0" y="6" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#9333ea">!</text>
    </g>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.9">Bedbug Treatment</text>
  <text x="400" y="415" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" opacity="0.7">Heat Treatment &amp; Chemical Solutions</text>
  <text x="400" y="570" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" opacity="0.4">800 x 600</text>
</svg>