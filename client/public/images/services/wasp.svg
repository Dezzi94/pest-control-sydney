<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eab308;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ca8a04;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#accent)" opacity="0.3"/>
  <circle cx="660" cy="100" r="100" fill="#eab308" opacity="0.04"/>
  <circle cx="140" cy="500" r="70" fill="#3b82f6" opacity="0.04"/>
  <!-- Wasp Icon -->
  <g transform="translate(400,225)" fill="none" stroke="#eab308" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Abdomen (striped) -->
    <ellipse cx="20" cy="5" rx="32" ry="20" fill="#eab308" opacity="0.12" stroke="#eab308"/>
    <!-- Stripes -->
    <line x1="8" y1="-10" x2="8" y2="20" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    <line x1="20" y1="-14" x2="20" y2="24" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    <line x1="32" y1="-12" x2="32" y2="22" stroke="#1a1a2e" stroke-width="4" opacity="0.3"/>
    <!-- Thorax (narrow waist) -->
    <ellipse cx="-12" cy="0" rx="12" ry="12" fill="#eab308" opacity="0.12" stroke="#eab308"/>
    <!-- Head -->
    <circle cx="-32" cy="-3" r="14" fill="#eab308" opacity="0.12" stroke="#eab308"/>
    <!-- Waist connector -->
    <line x1="-1" y1="0" x2="5" y2="0" stroke="#eab308" stroke-width="3"/>
    <!-- Antennae -->
    <path d="M-42,-14 Q-52,-35 -58,-42" stroke-width="2"/>
    <path d="M-38,-16 Q-42,-38 -44,-48" stroke-width="2"/>
    <!-- Eyes -->
    <circle cx="-36" cy="-6" r="3" fill="#eab308" opacity="0.4"/>
    <!-- Wings -->
    <ellipse cx="-5" cy="-22" rx="25" ry="12" fill="#eab308" opacity="0.06" stroke="#eab308" stroke-width="1.5" transform="rotate(-15 -5 -22)"/>
    <ellipse cx="5" cy="-28" rx="20" ry="10" fill="#eab308" opacity="0.04" stroke="#eab308" stroke-width="1" transform="rotate(-20 5 -28)"/>
    <!-- Stinger -->
    <path d="M52,5 L62,8" stroke-width="2.5"/>
    <!-- Legs -->
    <path d="M-18,10 L-28,28" stroke-width="2"/>
    <path d="M-8,12 L-12,30" stroke-width="2"/>
    <path d="M5,12 L8,30" stroke-width="2"/>
    <!-- Nest (hexagonal pattern) -->
    <g transform="translate(0,55)" opacity="0.15">
      <polygon points="0,-12 10,-6 10,6 0,12 -10,6 -10,-6" fill="none" stroke="#eab308" stroke-width="1"/>
      <polygon points="20,-12 30,-6 30,6 20,12 10,6 10,-6" fill="none" stroke="#eab308" stroke-width="1"/>
      <polygon points="-20,-12 -10,-6 -10,6 -20,12 -30,6 -30,-6" fill="none" stroke="#eab308" stroke-width="1"/>
      <polygon points="10,6 20,12 20,24 10,30 0,24 0,12" fill="none" stroke="#eab308" stroke-width="1"/>
      <polygon points="-10,6 0,12 0,24 -10,30 -20,24 -20,12" fill="none" stroke="#eab308" stroke-width="1"/>
    </g>
  </g>
  <text x="400" y="380" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.9">Wasp Removal</text>
  <text x="400" y="415" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" opacity="0.7">Safe Nest Removal &amp; Prevention</text>
  <text x="400" y="570" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" opacity="0.4">800 x 600</text>
</svg>