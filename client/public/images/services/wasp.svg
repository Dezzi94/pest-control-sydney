<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Nest (papery hexagonal structure) -->
  <g transform="translate(600, 180)" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="1.2" fill="none">
    <!-- Attachment stalk -->
    <line x1="0" y1="-60" x2="0" y2="-30" stroke-opacity="0.1" stroke-width="1.5"/>
    <!-- Outer nest envelope -->
    <path d="M-50 -30 Q-65 20 -55 70 Q-45 120 0 140 Q45 120 55 70 Q65 20 50 -30 Q30 -45 0 -45 Q-30 -45 -50 -30" stroke-opacity="0.1"/>
    <!-- Hexagonal cells (visible opening) -->
    <g stroke-opacity="0.15">
      <polygon points="0,-20 10,-14 10,-2 0,4 -10,-2 -10,-14"/>
      <polygon points="20,-20 30,-14 30,-2 20,4 10,-2 10,-14"/>
      <polygon points="-20,-20 -10,-14 -10,-2 -20,4 -30,-2 -30,-14"/>
      <polygon points="10,4 20,10 20,22 10,28 0,22 0,10"/>
      <polygon points="-10,4 0,10 0,22 -10,28 -20,22 -20,10"/>
      <polygon points="30,4 40,10 40,22 30,28 20,22 20,10"/>
      <polygon points="-30,4 -20,10 -20,22 -30,28 -40,22 -40,10"/>
      <polygon points="0,28 10,34 10,46 0,52 -10,46 -10,34"/>
      <polygon points="20,28 30,34 30,46 20,52 10,46 10,34"/>
      <polygon points="-20,28 -10,34 -10,46 -20,52 -30,46 -30,34"/>
      <polygon points="10,52 20,58 20,70 10,76 0,70 0,58"/>
      <polygon points="-10,52 0,58 0,70 -10,76 -20,70 -20,58"/>
    </g>
    <!-- Larvae dots in some cells -->
    <g fill="#3b82f6" fill-opacity="0.05">
      <circle cx="10" cy="-8" r="4"/>
      <circle cx="-10" cy="16" r="4"/>
      <circle cx="10" cy="40" r="4"/>
    </g>
  </g>
  <!-- Main wasp -->
  <g transform="translate(470, 340)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Metasoma / abdomen (tapered, with stripes) -->
    <ellipse cx="30" cy="5" rx="36" ry="18" stroke-opacity="0.3"/>
    <!-- Abdomen stripes -->
    <line x1="16" y1="-8" x2="16" y2="18" stroke-opacity="0.1" stroke-width="5"/>
    <line x1="30" y1="-12" x2="30" y2="22" stroke-opacity="0.1" stroke-width="5"/>
    <line x1="44" y1="-10" x2="44" y2="20" stroke-opacity="0.1" stroke-width="5"/>
    <!-- Petiole (narrow waist) -->
    <path d="M-6 3 Q-2 2 4 4" stroke-opacity="0.3" stroke-width="2.5"/>
    <!-- Mesosoma (thorax) -->
    <ellipse cx="-18" cy="0" rx="16" ry="14" stroke-opacity="0.28"/>
    <!-- Head -->
    <circle cx="-42" cy="-3" r="14" stroke-opacity="0.3"/>
    <!-- Eyes (large, compound) -->
    <ellipse cx="-48" cy="-6" rx="5" ry="7" stroke-opacity="0.25" fill="#3b82f6" fill-opacity="0.05"/>
    <ellipse cx="-36" cy="-6" rx="5" ry="7" stroke-opacity="0.25" fill="#3b82f6" fill-opacity="0.05"/>
    <!-- Antennae -->
    <path d="M-50 -16 Q-60 -32 -68 -40 Q-74 -46 -76 -52" stroke-opacity="0.25" stroke-width="1.5"/>
    <path d="M-46 -16 Q-52 -34 -56 -46 Q-58 -52 -58 -58" stroke-opacity="0.25" stroke-width="1.5"/>
    <!-- Mandibles -->
    <path d="M-54 2 L-60 6" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M-52 6 L-56 12" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Wings (two pairs) -->
    <ellipse cx="-10" cy="-24" rx="30" ry="14" stroke-opacity="0.15" transform="rotate(-10 -10 -24)"/>
    <ellipse cx="0" cy="-28" rx="22" ry="10" stroke-opacity="0.1" transform="rotate(-15 0 -28)"/>
    <!-- Wing venation -->
    <path d="M-20 -24 L0 -22 L10 -18" stroke-opacity="0.06" stroke-width="0.8"/>
    <path d="M-15 -28 L-5 -30 L8 -28" stroke-opacity="0.06" stroke-width="0.8"/>
    <!-- Stinger -->
    <path d="M66 5 L74 7 L78 6" stroke-opacity="0.3" stroke-width="2"/>
    <!-- Legs -->
    <path d="M-26 12 L-36 28 L-42 34" stroke-opacity="0.2" stroke-width="1.8"/>
    <path d="M-14 14 L-18 30 L-22 36" stroke-opacity="0.2" stroke-width="1.8"/>
    <path d="M-2 12 L2 30 L6 36" stroke-opacity="0.2" stroke-width="1.8"/>
    <!-- Hind leg dangling -->
    <path d="M18 14 L24 30 L20 42" stroke-opacity="0.15" stroke-width="1.5"/>
  </g>
  <!-- Small wasp near nest -->
  <g transform="translate(540, 220) scale(0.45) rotate(-20)" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="2" fill="none" stroke-linecap="round">
    <ellipse cx="30" cy="5" rx="36" ry="18"/>
    <path d="M-6 3 Q-2 2 4 4" stroke-width="2.5"/>
    <ellipse cx="-18" cy="0" rx="16" ry="14"/>
    <circle cx="-42" cy="-3" r="14"/>
    <path d="M-50 -16 Q-60 -32 -68 -40"/>
    <path d="M-46 -16 Q-52 -34 -56 -46"/>
    <ellipse cx="-10" cy="-24" rx="30" ry="14" transform="rotate(-10 -10 -24)"/>
    <path d="M66 5 L74 7"/>
  </g>
</svg>