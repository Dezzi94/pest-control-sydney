<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.55" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Circular highlight behind cockroach -->
  <circle cx="520" cy="280" r="160" stroke="#3b82f6" stroke-opacity="0.08" stroke-width="1.5" fill="none"/>
  <circle cx="520" cy="280" r="120" stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1" fill="none"/>
  <circle cx="520" cy="280" r="200" stroke="#3b82f6" stroke-opacity="0.04" stroke-width="1" fill="none" stroke-dasharray="6 4"/>
  <!-- Main cockroach -->
  <g transform="translate(520, 270)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Abdomen -->
    <ellipse cx="0" cy="20" rx="32" ry="50" stroke-opacity="0.25"/>
    <!-- Thorax / pronotum -->
    <ellipse cx="0" cy="-35" rx="28" ry="22" stroke-opacity="0.25"/>
    <!-- Head -->
    <ellipse cx="0" cy="-62" rx="16" ry="14" stroke-opacity="0.3"/>
    <!-- Long antennae -->
    <path d="M-10 -74 Q-30 -110 -60 -130 Q-80 -142 -100 -140" stroke-opacity="0.25" stroke-width="1.8"/>
    <path d="M10 -74 Q30 -110 60 -130 Q80 -142 100 -140" stroke-opacity="0.25" stroke-width="1.8"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-66" r="3" stroke-opacity="0.35" fill="#3b82f6" fill-opacity="0.1"/>
    <circle cx="8" cy="-66" r="3" stroke-opacity="0.35" fill="#3b82f6" fill-opacity="0.1"/>
    <!-- Wing division lines -->
    <line x1="0" y1="-15" x2="0" y2="60" stroke-opacity="0.1" stroke-width="1"/>
    <path d="M-8 -10 Q-12 20 -10 55" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M8 -10 Q12 20 10 55" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Legs - 3 pairs, jointed -->
    <!-- Front pair -->
    <path d="M-28 -30 L-50 -52 L-62 -60" stroke-opacity="0.3" stroke-width="1.8"/>
    <path d="M28 -30 L50 -52 L62 -60" stroke-opacity="0.3" stroke-width="1.8"/>
    <!-- Middle pair -->
    <path d="M-32 -10 L-60 -14 L-76 -8" stroke-opacity="0.3" stroke-width="1.8"/>
    <path d="M32 -10 L60 -14 L76 -8" stroke-opacity="0.3" stroke-width="1.8"/>
    <!-- Rear pair -->
    <path d="M-30 20 L-56 35 L-70 50" stroke-opacity="0.3" stroke-width="1.8"/>
    <path d="M30 20 L56 35 L70 50" stroke-opacity="0.3" stroke-width="1.8"/>
    <!-- Cerci (tail appendages) -->
    <path d="M-8 68 Q-14 80 -18 88" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M8 68 Q14 80 18 88" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Spines on legs -->
    <line x1="-55" y1="-50" x2="-58" y2="-56" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="55" y1="-50" x2="58" y2="-56" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="-65" y1="-12" x2="-70" y2="-16" stroke-opacity="0.15" stroke-width="1"/>
    <line x1="65" y1="-12" x2="70" y2="-16" stroke-opacity="0.15" stroke-width="1"/>
  </g>
  <!-- Small secondary cockroach -->
  <g transform="translate(380, 420) scale(0.4) rotate(-30)" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="2" fill="none" stroke-linecap="round">
    <ellipse cx="0" cy="20" rx="32" ry="50"/>
    <ellipse cx="0" cy="-35" rx="28" ry="22"/>
    <ellipse cx="0" cy="-62" rx="16" ry="14"/>
    <path d="M-10 -74 Q-30 -110 -60 -130"/>
    <path d="M10 -74 Q30 -110 60 -130"/>
    <path d="M-28 -30 L-50 -52 L-62 -60"/>
    <path d="M28 -30 L50 -52 L62 -60"/>
    <path d="M-32 -10 L-60 -14 L-76 -8"/>
    <path d="M32 -10 L60 -14 L76 -8"/>
    <path d="M-30 20 L-56 35 L-70 50"/>
    <path d="M30 20 L56 35 L70 50"/>
  </g>
</svg>