<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#accent)" opacity="0.4"/>
  <!-- Decorative elements -->
  <circle cx="680" cy="120" r="100" fill="#ef4444" opacity="0.04"/>
  <circle cx="120" cy="480" r="70" fill="#3b82f6" opacity="0.04"/>
  <!-- Cockroach Icon -->
  <g transform="translate(400,230)" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body segments -->
    <ellipse cx="0" cy="15" rx="30" ry="45" fill="#ef4444" opacity="0.12" stroke="#ef4444"/>
    <ellipse cx="0" cy="-35" rx="22" ry="25" fill="#ef4444" opacity="0.12" stroke="#ef4444"/>
    <ellipse cx="0" cy="-60" rx="14" ry="14" fill="#ef4444" opacity="0.12" stroke="#ef4444"/>
    <!-- Long antennae -->
    <path d="M-8,-72 Q-35,-110 -55,-120" stroke-width="2"/>
    <path d="M8,-72 Q35,-110 55,-120" stroke-width="2"/>
    <!-- Legs - 3 pairs -->
    <path d="M-30,0 L-58,-20 L-68,-35" stroke-width="2"/>
    <path d="M-30,15 L-60,12 L-72,5" stroke-width="2"/>
    <path d="M-28,35 L-55,45 L-65,55" stroke-width="2"/>
    <path d="M30,0 L58,-20 L68,-35" stroke-width="2"/>
    <path d="M30,15 L60,12 L72,5" stroke-width="2"/>
    <path d="M28,35 L55,45 L65,55" stroke-width="2"/>
    <!-- Wing lines -->
    <path d="M-5,-20 L-5,40" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
    <path d="M5,-20 L5,40" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
    <!-- Eyes -->
    <circle cx="-8" cy="-65" r="3" fill="#ef4444" opacity="0.5"/>
    <circle cx="8" cy="-65" r="3" fill="#ef4444" opacity="0.5"/>
    <!-- X mark (elimination) -->
    <circle cx="0" cy="0" r="80" stroke="#ef4444" stroke-width="2" opacity="0.2" fill="none" stroke-dasharray="8,4"/>
  </g>
  <!-- Label -->
  <text x="400" y="375" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.9">Cockroach Treatment</text>
  <text x="400" y="410" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" opacity="0.7">Complete Elimination Guaranteed</text>
  <text x="400" y="570" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" opacity="0.4">800 x 600</text>
</svg>