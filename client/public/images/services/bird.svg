<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Building ledge / parapet -->
  <g stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1.5" fill="none">
    <!-- Main ledge -->
    <rect x="340" y="350" width="420" height="14" rx="1" stroke-opacity="0.12"/>
    <!-- Wall below -->
    <line x1="340" y1="364" x2="340" y2="580"/>
    <line x1="760" y1="364" x2="760" y2="580"/>
    <!-- Wall texture -->
    <line x1="380" y1="400" x2="480" y2="400" stroke-opacity="0.04"/>
    <line x1="400" y1="430" x2="500" y2="430" stroke-opacity="0.04"/>
    <line x1="360" y1="460" x2="460" y2="460" stroke-opacity="0.04"/>
    <line x1="500" y1="400" x2="600" y2="400" stroke-opacity="0.04"/>
    <line x1="520" y1="430" x2="620" y2="430" stroke-opacity="0.04"/>
    <line x1="480" y1="460" x2="580" y2="460" stroke-opacity="0.04"/>
    <line x1="620" y1="400" x2="720" y2="400" stroke-opacity="0.04"/>
    <line x1="640" y1="430" x2="740" y2="430" stroke-opacity="0.04"/>
    <!-- Window -->
    <rect x="540" y="400" width="70" height="55" rx="2" stroke-opacity="0.06"/>
    <line x1="575" y1="400" x2="575" y2="455" stroke-opacity="0.04"/>
    <line x1="540" y1="428" x2="610" y2="428" stroke-opacity="0.04"/>
  </g>
  <!-- Anti-bird spikes on ledge -->
  <g stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1.2" fill="none" stroke-linecap="round">
    <!-- Spike base strip -->
    <line x1="360" y1="350" x2="740" y2="350" stroke-opacity="0.08"/>
    <!-- Individual spikes -->
    <line x1="370" y1="350" x2="373" y2="330"/>
    <line x1="370" y1="350" x2="367" y2="332"/>
    <line x1="385" y1="350" x2="388" y2="328"/>
    <line x1="385" y1="350" x2="382" y2="330"/>
    <line x1="400" y1="350" x2="403" y2="330"/>
    <line x1="400" y1="350" x2="397" y2="332"/>
    <line x1="415" y1="350" x2="418" y2="328"/>
    <line x1="415" y1="350" x2="412" y2="330"/>
    <line x1="430" y1="350" x2="433" y2="330"/>
    <line x1="430" y1="350" x2="427" y2="332"/>
    <line x1="445" y1="350" x2="448" y2="328"/>
    <line x1="445" y1="350" x2="442" y2="330"/>
    <line x1="460" y1="350" x2="463" y2="330"/>
    <line x1="460" y1="350" x2="457" y2="332"/>
    <line x1="475" y1="350" x2="478" y2="328"/>
    <line x1="475" y1="350" x2="472" y2="330"/>
    <!-- Gap where bird is perched -->
    <!-- More spikes after gap -->
    <line x1="610" y1="350" x2="613" y2="330"/>
    <line x1="610" y1="350" x2="607" y2="332"/>
    <line x1="625" y1="350" x2="628" y2="328"/>
    <line x1="625" y1="350" x2="622" y2="330"/>
    <line x1="640" y1="350" x2="643" y2="330"/>
    <line x1="640" y1="350" x2="637" y2="332"/>
    <line x1="655" y1="350" x2="658" y2="328"/>
    <line x1="655" y1="350" x2="652" y2="330"/>
    <line x1="670" y1="350" x2="673" y2="330"/>
    <line x1="670" y1="350" x2="667" y2="332"/>
    <line x1="685" y1="350" x2="688" y2="328"/>
    <line x1="685" y1="350" x2="682" y2="330"/>
    <line x1="700" y1="350" x2="703" y2="330"/>
    <line x1="700" y1="350" x2="697" y2="332"/>
    <line x1="715" y1="350" x2="718" y2="328"/>
    <line x1="715" y1="350" x2="712" y2="330"/>
    <line x1="730" y1="350" x2="733" y2="330"/>
    <line x1="730" y1="350" x2="727" y2="332"/>
  </g>
  <!-- Pigeon / bird on ledge -->
  <g transform="translate(540, 310)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body -->
    <ellipse cx="0" cy="10" rx="35" ry="24" stroke-opacity="0.3"/>
    <!-- Head -->
    <circle cx="-32" cy="-12" r="16" stroke-opacity="0.3"/>
    <!-- Neck curve -->
    <path d="M-20 2 Q-24 -4 -22 -8" stroke-opacity="0.15" stroke-width="1.5"/>
    <!-- Eye -->
    <circle cx="-36" cy="-14" r="3" stroke-opacity="0.35" fill="#3b82f6" fill-opacity="0.08"/>
    <!-- Beak -->
    <path d="M-48 -12 L-56 -10 L-48 -8" stroke-opacity="0.3" stroke-width="1.8"/>
    <!-- Eye ring -->
    <circle cx="-36" cy="-14" r="6" stroke-opacity="0.1" stroke-width="0.8"/>
    <!-- Wing (folded) -->
    <path d="M-10 -4 Q10 -10 30 -2 Q36 4 34 14 Q28 24 10 26" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Wing feather lines -->
    <path d="M5 0 Q20 4 30 12" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M0 4 Q15 8 28 16" stroke-opacity="0.08" stroke-width="1"/>
    <path d="M-5 8 Q10 14 24 20" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Tail feathers -->
    <path d="M30 16 Q44 22 52 28" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M28 20 Q42 26 48 32" stroke-opacity="0.18" stroke-width="1.5"/>
    <path d="M26 24 Q38 30 44 36" stroke-opacity="0.15" stroke-width="1.5"/>
    <!-- Legs -->
    <path d="M-8 32 L-8 40 L-14 44" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M-8 40 L-4 44" stroke-opacity="0.2" stroke-width="1.2"/>
    <path d="M8 32 L8 40 L2 44" stroke-opacity="0.2" stroke-width="1.5"/>
    <path d="M8 40 L12 44" stroke-opacity="0.2" stroke-width="1.2"/>
    <!-- Breast iridescence -->
    <path d="M-16 10 Q-14 16 -10 20" stroke-opacity="0.06" stroke-width="1"/>
    <path d="M-20 6 Q-18 14 -14 18" stroke-opacity="0.06" stroke-width="1"/>
  </g>
  <!-- Droppings on wall -->
  <g fill="#3b82f6" fill-opacity="0.06">
    <path d="M530 370 Q532 380 528 388 Q534 386 530 370" stroke="#3b82f6" stroke-opacity="0.06" stroke-width="0.5"/>
    <path d="M555 372 Q557 382 553 390 Q559 388 555 372" stroke="#3b82f6" stroke-opacity="0.05" stroke-width="0.5"/>
  </g>
</svg>