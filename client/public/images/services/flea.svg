<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Magnification circle -->
  <circle cx="530" cy="280" r="180" stroke="#3b82f6" stroke-opacity="0.06" stroke-width="2" fill="none"/>
  <circle cx="530" cy="280" r="185" stroke="#3b82f6" stroke-opacity="0.04" stroke-width="1" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="657" y1="408" x2="720" y2="470" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="6" stroke-linecap="round"/>
  <!-- Enlarged flea -->
  <g transform="translate(520, 270)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body (laterally compressed, oval) -->
    <ellipse cx="0" cy="0" rx="28" ry="48" stroke-opacity="0.3"/>
    <!-- Head -->
    <ellipse cx="-8" cy="-52" rx="16" ry="18" stroke-opacity="0.3"/>
    <!-- Eye -->
    <circle cx="-14" cy="-56" r="4" stroke-opacity="0.35" fill="#3b82f6" fill-opacity="0.08"/>
    <!-- Proboscis (piercing mouthpart) -->
    <path d="M-18 -66 L-26 -82 L-22 -84" stroke-opacity="0.3" stroke-width="1.8"/>
    <path d="M-20 -68 L-24 -80" stroke-opacity="0.2" stroke-width="1.2"/>
    <!-- Short antennae (in groove) -->
    <path d="M0 -68 Q6 -74 10 -72" stroke-opacity="0.2" stroke-width="1.5"/>
    <!-- Body segments / ctenidial combs -->
    <line x1="-20" y1="-30" x2="20" y2="-30" stroke-opacity="0.12" stroke-width="1"/>
    <line x1="-24" y1="-15" x2="24" y2="-15" stroke-opacity="0.1" stroke-width="1"/>
    <line x1="-28" y1="0" x2="28" y2="0" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="-24" y1="15" x2="24" y2="15" stroke-opacity="0.08" stroke-width="1"/>
    <line x1="-20" y1="30" x2="20" y2="30" stroke-opacity="0.08" stroke-width="1"/>
    <!-- Spines -->
    <g stroke-opacity="0.15" stroke-width="1">
      <line x1="10" y1="-22" x2="16" y2="-26"/>
      <line x1="14" y1="-10" x2="20" y2="-14"/>
      <line x1="16" y1="5" x2="22" y2="2"/>
      <line x1="14" y1="18" x2="20" y2="16"/>
    </g>
    <!-- Strong back jumping legs (largest pair) -->
    <path d="M18 28 Q40 34 50 24 Q58 14 66 -6 Q72 -20 78 -30" stroke-opacity="0.3" stroke-width="2.2"/>
    <path d="M14 38 Q34 46 44 38 Q52 28 58 14 Q64 2 68 -8" stroke-opacity="0.25" stroke-width="2"/>
    <!-- Middle legs -->
    <path d="M-22 -6 Q-36 -2 -44 -8 Q-50 -14 -56 -20" stroke-opacity="0.25" stroke-width="1.8"/>
    <path d="M-22 10 Q-38 14 -46 10 Q-52 6 -58 0" stroke-opacity="0.25" stroke-width="1.8"/>
    <!-- Front legs -->
    <path d="M-22 -28 Q-34 -26 -42 -32 Q-48 -38 -52 -44" stroke-opacity="0.25" stroke-width="1.8"/>
    <path d="M-22 -18 Q-36 -16 -44 -22" stroke-opacity="0.2" stroke-width="1.8"/>
    <!-- Jump trajectory arc -->
    <path d="M78 -30 Q95 -60 115 -55 Q135 -50 145 -30 Q152 -15 150 5" stroke-opacity="0.08" stroke-width="1.5" stroke-dasharray="5 4"/>
    <!-- Small arrow at end of trajectory -->
    <path d="M148 -2 L150 5 L153 -1" stroke-opacity="0.08" stroke-width="1.2"/>
  </g>
</svg>