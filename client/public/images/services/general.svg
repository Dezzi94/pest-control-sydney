<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.02"/>
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- House silhouette behind shield -->
  <g transform="translate(530, 320)" stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- House outline -->
    <path d="M-80 20 L0 -50 L80 20" stroke-opacity="0.08"/>
    <rect x="-65" y="20" width="130" height="80" rx="2" stroke-opacity="0.06"/>
    <!-- Chimney -->
    <rect x="30" y="-30" width="18" height="40" rx="1" stroke-opacity="0.06"/>
    <!-- Window left -->
    <rect x="-50" y="35" width="30" height="25" rx="2" stroke-opacity="0.06"/>
    <line x1="-35" y1="35" x2="-35" y2="60" stroke-opacity="0.04"/>
    <line x1="-50" y1="48" x2="-20" y2="48" stroke-opacity="0.04"/>
    <!-- Window right -->
    <rect x="20" y="35" width="30" height="25" rx="2" stroke-opacity="0.06"/>
    <line x1="35" y1="35" x2="35" y2="60" stroke-opacity="0.04"/>
    <line x1="20" y1="48" x2="50" y2="48" stroke-opacity="0.04"/>
    <!-- Door -->
    <rect x="-12" y="60" width="24" height="40" rx="2" stroke-opacity="0.06"/>
    <circle cx="6" cy="82" r="2" stroke-opacity="0.06"/>
    <!-- Garden/ground -->
    <line x1="-100" y1="100" x2="100" y2="100" stroke-opacity="0.04"/>
    <!-- Tree suggestion -->
    <circle cx="-90" cy="70" r="20" stroke-opacity="0.04"/>
    <line x1="-90" y1="90" x2="-90" y2="100" stroke-opacity="0.04"/>
  </g>
  <!-- Main shield with checkmark -->
  <g transform="translate(530, 270)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Shield shape -->
    <path d="M0 -110 L75 -80 L75 10 Q75 75 0 110 Q-75 75 -75 10 L-75 -80 Z" stroke-opacity="0.25" fill="url(#shield-grad)"/>
    <!-- Inner shield border -->
    <path d="M0 -95 L62 -68 L62 5 Q62 62 0 92 Q-62 62 -62 5 L-62 -68 Z" stroke-opacity="0.1" stroke-width="1"/>
    <!-- Large checkmark -->
    <path d="M-30 5 L-10 30 L35 -25" stroke-opacity="0.35" stroke-width="4"/>
    <!-- Protection rays emanating from shield -->
    <g stroke-opacity="0.08" stroke-width="1">
      <line x1="-85" y1="-40" x2="-100" y2="-50"/>
      <line x1="-80" y1="30" x2="-98" y2="40"/>
      <line x1="85" y1="-40" x2="100" y2="-50"/>
      <line x1="80" y1="30" x2="98" y2="40"/>
      <line x1="0" y1="-120" x2="0" y2="-135"/>
      <line x1="-50" y1="-100" x2="-60" y2="-115"/>
      <line x1="50" y1="-100" x2="60" y2="-115"/>
    </g>
  </g>
  <!-- Subtle pest silhouettes being blocked -->
  <g stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1" fill="none" stroke-linecap="round">
    <!-- Small bug top-left -->
    <g transform="translate(380, 150) scale(0.3)">
      <ellipse cx="0" cy="0" rx="20" ry="14"/>
      <ellipse cx="-18" cy="-2" rx="10" ry="8"/>
      <path d="M-14 -10 L-20 -20"/>
      <path d="M-12 -10 L-16 -22"/>
      <path d="M-10 10 L-16 20"/>
      <path d="M0 12 L0 22"/>
    </g>
    <!-- Small spider top-right -->
    <g transform="translate(680, 140) scale(0.3)">
      <circle cx="0" cy="0" r="10"/>
      <ellipse cx="0" cy="16" rx="12" ry="16"/>
      <path d="M-8 -4 L-24 -20"/>
      <path d="M8 -4 L24 -20"/>
      <path d="M-10 4 L-28 8"/>
      <path d="M10 4 L28 8"/>
    </g>
    <!-- Small ant bottom -->
    <g transform="translate(420, 470) scale(0.3)">
      <ellipse cx="20" cy="0" rx="14" ry="10"/>
      <circle cx="4" cy="-2" r="4"/>
      <ellipse cx="-10" cy="-2" rx="10" ry="8"/>
      <path d="M-18 -8 L-26 -16"/>
      <path d="M-16 -10 L-22 -20"/>
    </g>
  </g>
</svg>