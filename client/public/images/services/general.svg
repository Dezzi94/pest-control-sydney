<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="shield-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0.05" />
    </linearGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#accent)" opacity="0.4"/>
  <!-- Decorative -->
  <circle cx="670" cy="90" r="120" fill="#3b82f6" opacity="0.04"/>
  <circle cx="130" cy="510" r="80" fill="#22c55e" opacity="0.04"/>
  <!-- Shield Icon (protection concept) -->
  <g transform="translate(400,220)" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Large shield -->
    <path d="M0,-80 L55,-55 L55,10 Q55,60 0,90 Q-55,60 -55,10 L-55,-55 Z" fill="url(#shield-fill)" stroke="#3b82f6" stroke-width="3"/>
    <!-- Checkmark inside shield -->
    <path d="M-22,5 L-8,22 L25,-15" stroke="#22c55e" stroke-width="4" fill="none"/>
    <!-- House outline above shield -->
    <g transform="translate(0,-30) scale(0.5)">
      <!-- Small house silhouette inside shield -->
      <path d="M0,-40 L-35,-10 L-30,-10 L-30,20 L30,20 L30,-10 L35,-10 Z" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="2"/>
      <rect x="-8" y="0" width="16" height="20" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>
    </g>
    <!-- Spray particles (pest control concept) -->
    <circle cx="75" cy="-30" r="3" fill="#3b82f6" opacity="0.3"/>
    <circle cx="82" cy="-15" r="2" fill="#3b82f6" opacity="0.2"/>
    <circle cx="78" cy="5" r="2.5" fill="#3b82f6" opacity="0.25"/>
    <circle cx="-75" cy="-30" r="3" fill="#3b82f6" opacity="0.3"/>
    <circle cx="-82" cy="-15" r="2" fill="#3b82f6" opacity="0.2"/>
    <circle cx="-78" cy="5" r="2.5" fill="#3b82f6" opacity="0.25"/>
  </g>
  <!-- Label -->
  <text x="400" y="385" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.9">General Pest Control</text>
  <text x="400" y="420" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" opacity="0.7">Complete Home Protection</text>
  <text x="400" y="570" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" opacity="0.4">800 x 600</text>
</svg>