<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" fill="none">
  <defs>
    <radialGradient id="bg" cx="0.6" cy="0.4" r="0.55">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Roof structure -->
  <g stroke="#3b82f6" stroke-opacity="0.1" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Main roof line -->
    <path d="M320 340 L550 180 L780 340"/>
    <!-- Roof tiles/ridges -->
    <line x1="340" y1="334" x2="760" y2="334" stroke-opacity="0.06"/>
    <line x1="360" y1="324" x2="740" y2="324" stroke-opacity="0.06"/>
    <line x1="380" y1="314" x2="720" y2="314" stroke-opacity="0.06"/>
    <line x1="400" y1="304" x2="700" y2="304" stroke-opacity="0.06"/>
    <line x1="420" y1="294" x2="680" y2="294" stroke-opacity="0.06"/>
    <line x1="440" y1="284" x2="660" y2="284" stroke-opacity="0.06"/>
    <line x1="460" y1="274" x2="640" y2="274" stroke-opacity="0.06"/>
    <line x1="480" y1="264" x2="620" y2="264" stroke-opacity="0.06"/>
    <line x1="500" y1="254" x2="600" y2="254" stroke-opacity="0.06"/>
    <line x1="520" y1="244" x2="580" y2="244" stroke-opacity="0.06"/>
    <!-- Ridge cap -->
    <line x1="540" y1="178" x2="560" y2="178" stroke-opacity="0.1" stroke-width="3"/>
    <!-- Fascia board -->
    <line x1="310" y1="340" x2="790" y2="340" stroke-opacity="0.12" stroke-width="2"/>
    <line x1="310" y1="348" x2="790" y2="348" stroke-opacity="0.08"/>
    <!-- Gutter -->
    <path d="M310 348 Q310 356 318 356 L782 356 Q790 356 790 348" stroke-opacity="0.08"/>
    <!-- Eave gap / entry point -->
    <ellipse cx="680" cy="340" rx="20" ry="5" stroke-opacity="0.12" fill="#3b82f6" fill-opacity="0.02"/>
    <!-- Wall below roofline -->
    <line x1="330" y1="356" x2="330" y2="560" stroke-opacity="0.06"/>
    <line x1="770" y1="356" x2="770" y2="560" stroke-opacity="0.06"/>
    <!-- Wall details -->
    <rect x="400" y="400" width="70" height="55" rx="2" stroke-opacity="0.05"/>
    <rect x="580" y="400" width="70" height="55" rx="2" stroke-opacity="0.05"/>
  </g>
  <!-- Possum on roof ridge -->
  <g transform="translate(580, 240)" stroke="#3b82f6" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Body (hunched, sitting) -->
    <ellipse cx="0" cy="10" rx="40" ry="30" stroke-opacity="0.3"/>
    <!-- Head -->
    <ellipse cx="-40" cy="-14" rx="22" ry="20" stroke-opacity="0.3"/>
    <!-- Large ears (pointed, erect) -->
    <path d="M-52 -32 Q-58 -56 -52 -60 Q-48 -62 -44 -46 Q-42 -36 -46 -28" stroke-opacity="0.28"/>
    <path d="M-34 -30 Q-36 -54 -30 -58 Q-26 -60 -24 -44 Q-22 -34 -28 -26" stroke-opacity="0.28"/>
    <!-- Inner ears -->
    <path d="M-50 -36 Q-54 -50 -50 -54 Q-48 -54 -46 -42" stroke-opacity="0.12" stroke-width="1"/>
    <path d="M-33 -34 Q-34 -48 -30 -52 Q-28 -52 -26 -40" stroke-opacity="0.12" stroke-width="1"/>
    <!-- Eyes (large, reflective) -->
    <circle cx="-48" cy="-16" r="5" stroke-opacity="0.35" fill="#3b82f6" fill-opacity="0.08"/>
    <circle cx="-32" cy="-14" r="5" stroke-opacity="0.35" fill="#3b82f6" fill-opacity="0.08"/>
    <!-- Eye shine -->
    <circle cx="-46" cy="-18" r="1.5" fill="#3b82f6" fill-opacity="0.12"/>
    <circle cx="-30" cy="-16" r="1.5" fill="#3b82f6" fill-opacity="0.12"/>
    <!-- Nose (pink, triangular) -->
    <path d="M-60 -10 Q-64 -6 -60 -4 Q-56 -6 -60 -10" stroke-opacity="0.3" fill="#3b82f6" fill-opacity="0.06"/>
    <!-- Whiskers -->
    <line x1="-62" y1="-8" x2="-78" y2="-14" stroke-opacity="0.12" stroke-width="0.8"/>
    <line x1="-62" y1="-6" x2="-80" y2="-6" stroke-opacity="0.12" stroke-width="0.8"/>
    <line x1="-62" y1="-4" x2="-78" y2="2" stroke-opacity="0.12" stroke-width="0.8"/>
    <!-- Neck fur -->
    <path d="M-22 -4 Q-18 4 -16 8" stroke-opacity="0.1" stroke-width="1"/>
    <!-- Front paws (gripping) -->
    <path d="M-20 30 Q-26 38 -30 42" stroke-opacity="0.25" stroke-width="1.8"/>
    <path d="M-30 42 L-34 40 L-33 44 L-28 44" stroke-opacity="0.2" stroke-width="1.2"/>
    <path d="M-10 34 Q-14 40 -16 44" stroke-opacity="0.25" stroke-width="1.8"/>
    <!-- Back leg -->
    <path d="M20 34 Q24 40 28 44" stroke-opacity="0.2" stroke-width="1.8"/>
    <!-- Tail (long, curling, prehensile) -->
    <path d="M40 14 Q60 10 72 18 Q82 28 78 42 Q72 54 60 56 Q50 56 46 48" stroke-opacity="0.25" stroke-width="2"/>
    <!-- Fur texture on body -->
    <g stroke-opacity="0.06" stroke-width="0.8">
      <path d="M-15 0 Q-10 -4 -5 0"/>
      <path d="M-5 8 Q0 4 5 8"/>
      <path d="M10 0 Q15 -4 20 0"/>
      <path d="M5 16 Q10 12 15 16"/>
      <path d="M-20 14 Q-15 10 -10 14"/>
    </g>
  </g>
  <!-- Stars/moon (night scene suggestion) -->
  <g fill="#3b82f6" fill-opacity="0.06">
    <circle cx="420" cy="100" r="2"/>
    <circle cx="500" cy="70" r="1.5"/>
    <circle cx="650" cy="90" r="2"/>
    <circle cx="720" cy="120" r="1.5"/>
    <circle cx="380" cy="140" r="1.5"/>
  </g>
  <!-- Crescent moon -->
  <path d="M700 70 Q690 50 700 30 Q680 40 680 60 Q680 80 700 70" stroke="#3b82f6" stroke-opacity="0.06" stroke-width="1" fill="#3b82f6" fill-opacity="0.03"/>
</svg>