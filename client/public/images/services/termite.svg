<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e67e22;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d35400;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bg)"/>
  <!-- Subtle pattern overlay -->
  <rect width="800" height="600" fill="url(#accent)" opacity="0.5"/>
  <!-- Decorative circles -->
  <circle cx="650" cy="100" r="120" fill="#e67e22" opacity="0.05"/>
  <circle cx="150" cy="500" r="80" fill="#3b82f6" opacity="0.05"/>
  <!-- Termite Icon -->
  <g transform="translate(400,240)" fill="none" stroke="#e67e22" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bug body -->
    <ellipse cx="0" cy="0" rx="28" ry="40" fill="#e67e22" opacity="0.15" stroke="#e67e22"/>
    <ellipse cx="0" cy="-50" rx="18" ry="22" fill="#e67e22" opacity="0.15" stroke="#e67e22"/>
    <!-- Antennae -->
    <path d="M-10,-70 Q-20,-95 -30,-100" />
    <path d="M10,-70 Q20,-95 30,-100" />
    <!-- Legs -->
    <path d="M-28,-15 L-50,-30" />
    <path d="M-28,0 L-52,-5" />
    <path d="M-28,15 L-50,25" />
    <path d="M28,-15 L50,-30" />
    <path d="M28,0 L52,-5" />
    <path d="M28,15 L50,25" />
    <!-- Mandibles -->
    <path d="M-12,-70 L-18,-80" />
    <path d="M12,-70 L18,-80" />
    <!-- Magnifying glass around bug -->
    <circle cx="0" cy="-10" r="75" stroke="#e67e22" stroke-width="2" opacity="0.3" fill="none"/>
    <line x1="53" y1="43" x2="85" y2="75" stroke="#e67e22" stroke-width="4" opacity="0.3"/>
  </g>
  <!-- Label -->
  <text x="400" y="380" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="28" font-weight="600" fill="#ffffff" opacity="0.9">Termite Inspection</text>
  <text x="400" y="415" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="400" fill="#94a3b8" opacity="0.7">Professional Detection &amp; Treatment</text>
  <!-- Dimensions label -->
  <text x="400" y="570" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" opacity="0.4">800 x 600</text>
</svg>