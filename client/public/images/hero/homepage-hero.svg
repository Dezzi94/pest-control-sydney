<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 800" width="1920" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="glow2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1920" height="800" fill="url(#bg)"/>
  <!-- Abstract glow effects -->
  <ellipse cx="300" cy="400" rx="400" ry="300" fill="url(#glow1)"/>
  <ellipse cx="1600" cy="300" rx="350" ry="250" fill="url(#glow2)"/>
  <ellipse cx="960" cy="700" rx="500" ry="200" fill="#3b82f6" opacity="0.03"/>
  <!-- City skyline silhouette (Sydney inspired) -->
  <g fill="#1e293b" opacity="0.6">
    <!-- Buildings -->
    <rect x="100" y="550" width="60" height="250"/>
    <rect x="170" y="500" width="45" height="300"/>
    <rect x="225" y="520" width="55" height="280"/>
    <rect x="290" y="480" width="40" height="320"/>
    <rect x="340" y="530" width="70" height="270"/>
    <rect x="420" y="460" width="50" height="340"/>
    <rect x="480" y="510" width="45" height="290"/>
    <!-- Sydney Tower inspired -->
    <rect x="570" y="300" width="8" height="500"/>
    <rect x="555" y="300" width="38" height="30" rx="5"/>
    <rect x="560" y="280" width="28" height="25" rx="4"/>
    <!-- More buildings -->
    <rect x="620" y="490" width="65" height="310"/>
    <rect x="695" y="520" width="50" height="280"/>
    <rect x="755" y="470" width="55" height="330"/>
    <rect x="820" y="540" width="40" height="260"/>
    <!-- Opera house inspired curves -->
    <path d="M900,800 Q930,580 960,600 Q990,580 1020,800" fill="#1e293b"/>
    <path d="M1000,800 Q1030,560 1060,580 Q1090,560 1120,800" fill="#1e293b"/>
    <!-- Right side buildings -->
    <rect x="1150" y="510" width="60" height="290"/>
    <rect x="1220" y="480" width="50" height="320"/>
    <rect x="1280" y="530" width="45" height="270"/>
    <rect x="1335" y="490" width="55" height="310"/>
    <rect x="1400" y="550" width="40" height="250"/>
    <rect x="1450" y="500" width="65" height="300"/>
    <rect x="1525" y="520" width="50" height="280"/>
    <rect x="1585" y="480" width="45" height="320"/>
    <rect x="1640" y="540" width="60" height="260"/>
    <rect x="1710" y="510" width="55" height="290"/>
    <rect x="1775" y="550" width="50" height="250"/>
    <rect x="1835" y="530" width="45" height="270"/>
  </g>
  <!-- Building windows (dots of light) -->
  <g fill="#3b82f6" opacity="0.15">
    <rect x="115" y="570" width="8" height="8" rx="1"/>
    <rect x="130" y="570" width="8" height="8" rx="1"/>
    <rect x="115" y="590" width="8" height="8" rx="1"/>
    <rect x="130" y="590" width="8" height="8" rx="1"/>
    <rect x="115" y="610" width="8" height="8" rx="1"/>
    <rect x="130" y="610" width="8" height="8" rx="1"/>
    <rect x="435" y="480" width="8" height="8" rx="1"/>
    <rect x="450" y="480" width="8" height="8" rx="1"/>
    <rect x="435" y="500" width="8" height="8" rx="1"/>
    <rect x="450" y="500" width="8" height="8" rx="1"/>
    <rect x="770" y="490" width="8" height="8" rx="1"/>
    <rect x="785" y="490" width="8" height="8" rx="1"/>
    <rect x="770" y="510" width="8" height="8" rx="1"/>
    <rect x="785" y="510" width="8" height="8" rx="1"/>
  </g>
  <!-- Shield icon (center) -->
  <g transform="translate(960,320)" opacity="0.15">
    <path d="M0,-100 L70,-70 L70,15 Q70,75 0,110 Q-70,75 -70,15 L-70,-70 Z" fill="#3b82f6" stroke="#3b82f6" stroke-width="2"/>
    <path d="M-25,5 L-10,25 L30,-20" stroke="#22c55e" stroke-width="5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- Text area -->
  <text x="960" y="350" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="#ffffff" opacity="0.95">Pest Control Sydney</text>
  <text x="960" y="400" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#94a3b8" opacity="0.8">Professional Pest Management for Greater Sydney</text>
  <!-- CTA indicators -->
  <g transform="translate(880,450)">
    <rect x="0" y="0" width="160" height="48" rx="8" fill="#3b82f6" opacity="0.3"/>
    <text x="80" y="30" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" opacity="0.6">Get Free Quote</text>
  </g>
  <g transform="translate(1060,450)">
    <rect x="0" y="0" width="160" height="48" rx="8" fill="#22c55e" opacity="0.25"/>
    <text x="80" y="30" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#ffffff" opacity="0.6">Call Now</text>
  </g>
  <!-- Dimensions -->
  <text x="960" y="780" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="12" fill="#475569" opacity="0.3">1920 x 800 | Replace with professional hero image</text>
</svg>