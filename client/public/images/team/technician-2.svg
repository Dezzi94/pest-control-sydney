<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <circle cx="200" cy="190" r="130" fill="#22c55e" opacity="0.04"/>
  <!-- Person silhouette -->
  <g transform="translate(200,180)">
    <!-- Head -->
    <circle cx="0" cy="-50" r="45" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="2"/>
    <!-- Cap -->
    <path d="M-38,-65 Q-38,-90 0,-92 Q38,-90 38,-65" fill="#22c55e" opacity="0.15" stroke="#22c55e" stroke-width="1.5"/>
    <path d="M-42,-64 L48,-64" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.25"/>
    <!-- Visor -->
    <path d="M-42,-64 Q-48,-62 -50,-58" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.2"/>
    <!-- Eyes -->
    <circle cx="-15" cy="-52" r="3" fill="#94a3b8" opacity="0.4"/>
    <circle cx="15" cy="-52" r="3" fill="#94a3b8" opacity="0.4"/>
    <!-- Smile -->
    <path d="M-12,-36 Q0,-28 12,-36" fill="none" stroke="#94a3b8" stroke-width="2" opacity="0.3"/>
    <!-- Body / polo shirt -->
    <path d="M-45,0 Q-50,80 -45,140 L45,140 Q50,80 45,0 Q25,-10 0,-8 Q-25,-10 -45,0" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.5"/>
    <!-- Polo collar -->
    <path d="M-12,-5 L0,10 L12,-5" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.3"/>
    <!-- Company logo on chest -->
    <circle cx="-18" cy="25" r="10" fill="#3b82f6" opacity="0.1" stroke="#3b82f6" stroke-width="1"/>
    <!-- Clipboard in hand -->
    <rect x="40" y="40" width="25" height="35" rx="3" fill="#94a3b8" opacity="0.08" stroke="#94a3b8" stroke-width="1"/>
    <line x1="48" y1="52" x2="58" y2="52" stroke="#94a3b8" stroke-width="1" opacity="0.15"/>
    <line x1="48" y1="58" x2="58" y2="58" stroke="#94a3b8" stroke-width="1" opacity="0.15"/>
    <line x1="48" y1="64" x2="55" y2="64" stroke="#94a3b8" stroke-width="1" opacity="0.15"/>
  </g>
  <text x="200" y="390" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="20" font-weight="600" fill="#ffffff" opacity="0.85">Lead Inspector</text>
  <text x="200" y="418" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#94a3b8" opacity="0.6">Termite Specialist</text>
  <text x="200" y="480" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#475569" opacity="0.3">400 x 500</text>
</svg>