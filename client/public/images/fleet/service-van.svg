<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  <circle cx="600" cy="100" r="120" fill="#3b82f6" opacity="0.04"/>
  <circle cx="200" cy="400" r="80" fill="#22c55e" opacity="0.04"/>
  <!-- Service Van -->
  <g transform="translate(400,230)" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Van body -->
    <rect x="-120" y="-40" width="200" height="80" rx="5" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="2"/>
    <!-- Cab -->
    <path d="M80,-40 L80,-20 Q80,-5 95,-5 L130,-5 L130,40 L80,40" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="2"/>
    <!-- Windshield -->
    <path d="M82,-35 L105,-35 Q120,-35 125,-10 L128,-5" fill="#3b82f6" opacity="0.04" stroke="#3b82f6" stroke-width="1.5"/>
    <!-- Side window -->
    <rect x="85" y="-30" width="25" height="20" rx="3" fill="#3b82f6" opacity="0.05" stroke="#3b82f6" stroke-width="1"/>
    <!-- Cargo door lines -->
    <line x1="-40" y1="-35" x2="-40" y2="35" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <line x1="20" y1="-35" x2="20" y2="35" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>
    <!-- Company branding on van -->
    <rect x="-90" y="-25" width="120" height="22" rx="3" fill="#3b82f6" opacity="0.1"/>
    <text x="-30" y="-9" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3b82f6" opacity="0.4">PEST CONTROL SYDNEY</text>
    <!-- Phone on van -->
    <text x="-30" y="18" text-anchor="middle" font-family="Inter, sans-serif" font-size="10" fill="#22c55e" opacity="0.3">(02) 8765-4321</text>
    <!-- Wheels -->
    <circle cx="-75" cy="45" r="18" fill="#1a1a2e" stroke="#94a3b8" stroke-width="2" opacity="0.5"/>
    <circle cx="-75" cy="45" r="8" fill="#94a3b8" opacity="0.1"/>
    <circle cx="105" cy="45" r="18" fill="#1a1a2e" stroke="#94a3b8" stroke-width="2" opacity="0.5"/>
    <circle cx="105" cy="45" r="8" fill="#94a3b8" opacity="0.1"/>
    <!-- Roof rack / equipment -->
    <line x1="-100" y1="-45" x2="60" y2="-45" stroke="#94a3b8" stroke-width="2" opacity="0.2"/>
    <rect x="-60" y="-58" width="40" height="12" rx="3" fill="#94a3b8" opacity="0.08" stroke="#94a3b8" stroke-width="1"/>
    <!-- Ground line -->
    <line x1="-150" y1="63" x2="160" y2="63" stroke="#94a3b8" stroke-width="1" opacity="0.15"/>
  </g>
  <text x="400" y="350" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#ffffff" opacity="0.85">Our Service Fleet</text>
  <text x="400" y="380" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#94a3b8" opacity="0.6">Fully Equipped for Every Job</text>
  <text x="400" y="475" text-anchor="middle" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="11" fill="#475569" opacity="0.3">800 x 500</text>
</svg>