<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 56" fill="none">
  <!-- Shield icon mark -->
  <g transform="translate(0, 3)">
    <!-- Outer shield shape -->
    <path d="M25 2L4 12v14c0 13.2 8.95 25.54 21 28.5C37.05 51.54 46 39.2 46 26V12L25 2z" fill="#3b82f6"/>
    <!-- Inner shield highlight -->
    <path d="M25 6L8 14.4v11.6c0 11.22 7.24 21.72 17 24.24V6z" fill="#60a5fa" opacity="0.3"/>
    <!-- Checkmark inside shield -->
    <path d="M18 25l5 5 9-10" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Small bug silhouette top-right of shield -->
    <circle cx="38" cy="10" r="3" fill="white" opacity="0.25"/>
    <circle cx="38" cy="16" r="4" fill="white" opacity="0.25"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(56, 0)">
    <!-- "Pest Control" -->
    <text y="25" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#0f172a">
      Pest Control
    </text>
    <!-- "Sydney" -->
    <text y="48" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#3b82f6">
      Sydney
    </text>
  </g>
</svg>
